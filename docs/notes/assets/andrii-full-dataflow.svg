<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#ffffff"/>
  <text x="600" y="26" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Deploy Course Helper — fuldt dataflow (andrii.mercantec.tech)</text>

  <!-- ===== TOP ROW: client → DNS → Cloudflare → tunnel ===== -->
  <!-- Browser -->
  <rect x="30" y="48" width="280" height="96" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="170" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">User browser</text>
  <text x="170" y="98" text-anchor="middle" font-size="12" fill="#475569">https://andrii.mercantec.tech/</text>
  <text x="170" y="116" text-anchor="middle" font-size="12" fill="#475569">/api/terms · /api/health</text>
  <text x="170" y="134" text-anchor="middle" font-size="11" fill="#94a3b8">HTTPS (443)</text>

  <!-- DNS resolver -->
  <rect x="345" y="48" width="225" height="96" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="457" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">DNS resolver</text>
  <text x="457" y="102" text-anchor="middle" font-size="12" fill="#475569">rekursivt opslag</text>
  <text x="457" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">→ svarer Cloudflare-IP</text>

  <!-- Cloudflare -->
  <rect x="605" y="48" width="225" height="96" rx="10" fill="#fff3e8" stroke="#f48120" stroke-width="2.5"/>
  <text x="717" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">Cloudflare</text>
  <text x="717" y="102" text-anchor="middle" font-size="12" fill="#9a3412">DNS + HTTPS (TLS)</text>
  <text x="717" y="122" text-anchor="middle" font-size="11" fill="#b45309">edge — skjuler VM-IP</text>

  <!-- Tunnel -->
  <rect x="865" y="48" width="305" height="96" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="1017" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Cloudflare Tunnel</text>
  <text x="1017" y="108" text-anchor="middle" font-size="12" fill="#475569">krypteret, udgående forbindelse</text>

  <!-- top arrows -->
  <path d="M310 96 L343 96" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <path d="M570 96 L603 96" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <path d="M830 96 L863 96" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="587" y="40" text-anchor="middle" font-size="10" fill="#94a3b8">navn→IP</text>

  <!-- arrow down into VM -->
  <path d="M1017 144 L1017 185" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="1028" y="170" font-size="11" fill="#64748b">tunnel ind</text>

  <!-- ===== VM BOX ===== -->
  <rect x="40" y="188" width="1130" height="612" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2.5"/>
  <text x="60" y="216" font-size="16" font-weight="700" fill="#0f172a">VM andrii-deploy (10.133.51.121) · Ubuntu 24.04 · UFW: kun 22 / 80 / 443</text>

  <!-- cloudflared container -->
  <rect x="80" y="270" width="250" height="82" rx="10" fill="#e9f9ef" stroke="#16a34a" stroke-width="2.5"/>
  <text x="205" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">cloudflared container</text>
  <text x="205" y="324" text-anchor="middle" font-size="12" fill="#15803d">--network host</text>
  <text x="205" y="342" text-anchor="middle" font-size="11" fill="#64748b">--protocol http2</text>

  <!-- nginx host -->
  <rect x="450" y="270" width="250" height="82" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2.5"/>
  <text x="575" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">nginx på VM :8080</text>
  <text x="575" y="324" text-anchor="middle" font-size="12" fill="#475569">reverse proxy (host)</text>
  <text x="575" y="342" text-anchor="middle" font-size="11" fill="#64748b">127.0.0.1:8080</text>

  <!-- cloudflared -> nginx -->
  <path d="M330 311 L448 311" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="389" y="302" text-anchor="middle" font-size="11" fill="#64748b">localhost:8080</text>

  <!-- nginx split: vertical then branches -->
  <path d="M575 352 L575 392" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <path d="M575 392 L300 392 L300 430" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <path d="M575 392 L860 392 L860 428" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="430" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">location /</text>
  <text x="720" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">location /api/  ·  proxy_pass</text>

  <!-- static files -->
  <rect x="175" y="432" width="250" height="92" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="300" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Statiske filer</text>
  <text x="300" y="488" text-anchor="middle" font-size="12" fill="#475569">SPA: HTML / CSS / JS</text>
  <text x="300" y="508" text-anchor="middle" font-size="11" fill="#64748b">wwwroot (i app-container)</text>

  <!-- app container (compose) -->
  <rect x="600" y="432" width="510" height="180" rx="12" fill="#e9f9ef" stroke="#16a34a" stroke-width="2.5"/>
  <text x="855" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Docker app-container  :5000 → :3000  (Compose)</text>

  <!-- mercantecapi app -->
  <rect x="625" y="478" width="210" height="110" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="730" y="520" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">MercantecApi</text>
  <text x="730" y="542" text-anchor="middle" font-size="12" fill="#15803d">ASP.NET Core 8 (Kestrel)</text>
  <text x="730" y="562" text-anchor="middle" font-size="11" fill="#64748b">/api/terms · /api/health</text>

  <!-- db cylinder -->
  <g>
    <rect x="905" y="486" width="170" height="96" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <ellipse cx="990" cy="486" rx="85" ry="14" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="990" y="524" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">PostgreSQL 16</text>
    <text x="990" y="546" text-anchor="middle" font-size="12" fill="#15803d">volume pgdata</text>
    <text x="990" y="566" text-anchor="middle" font-size="11" fill="#94a3b8">(persistent · backup)</text>
  </g>

  <!-- app -> db -->
  <path d="M835 536 L903 536" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="869" y="528" text-anchor="middle" font-size="10" fill="#64748b">db:5432</text>
  <text x="869" y="556" text-anchor="middle" font-size="9" fill="#cbd5e1">(klargjort, ikke i brug endnu)</text>

  <!-- SSH admin door (separate, below static files) -->
  <rect x="95" y="540" width="255" height="80" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="222" y="570" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">SSH :22 — admin-dør</text>
  <text x="222" y="591" text-anchor="middle" font-size="11" fill="#475569">Mac → VPN + kun ed25519-nøgle</text>
  <text x="222" y="610" text-anchor="middle" font-size="11" fill="#94a3b8">adskilt fra web-trafik</text>

  <!-- ===== Deploy / management lane (dashed) ===== -->
  <rect x="80" y="640" width="1030" height="138" rx="12" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="100" y="664" font-size="13" font-weight="700" fill="#64748b">Deploy / management — IKKE i user request-path</text>

  <rect x="110" y="680" width="270" height="78" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="245" y="712" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">GitHub Actions (CI)</text>
  <text x="245" y="734" text-anchor="middle" font-size="11" fill="#475569">docker build på push</text>

  <rect x="470" y="680" width="270" height="78" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="605" y="712" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Dokploy (CD) :3000</text>
  <text x="605" y="734" text-anchor="middle" font-size="11" fill="#475569">docker compose up --build</text>

  <rect x="800" y="680" width="280" height="78" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="940" y="712" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Webhook (git push → main)</text>
  <text x="940" y="734" text-anchor="middle" font-size="11" fill="#475569">application/json → redeploy ~1 min</text>

  <path d="M380 719 L468 719" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M800 719 L742 719" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ab)"/>

  <!-- ===== Legend ===== -->
  <rect x="40" y="822" width="600" height="64" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="60" y="840" width="22" height="22" rx="4" fill="#eff4ff" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="856" font-size="12" fill="#475569">Network / routing</text>
  <rect x="230" y="840" width="22" height="22" rx="4" fill="#e9f9ef" stroke="#16a34a" stroke-width="2"/>
  <text x="260" y="856" font-size="12" fill="#475569">Docker / containers</text>
  <rect x="410" y="840" width="22" height="22" rx="4" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="440" y="856" font-size="12" fill="#475569">VM / host</text>
  <rect x="540" y="840" width="22" height="22" rx="4" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="570" y="856" font-size="12" fill="#475569">Deploy / mgmt</text>
</svg>
